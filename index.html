<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="loginPage" class="auth-screen">
    <section class="auth-card">
      <h1>Вхід</h1>
      <div
        id="g_id_onload"
        data-client_id="758097653129-i5cda00k5b73uudvmmalj2jdvk70t5jr.apps.googleusercontent.com"
        data-callback="handleCredentialResponse"
        data-auto_prompt="false"
        data-ux_mode="popup"
      ></div>
      <div class="google-button-wrap">
        <div
          class="g_id_signin"
          data-type="standard"
          data-size="large"
          data-theme="outline"
          data-shape="pill"
          data-text="continue_with"
          data-width="250"
        ></div>
      </div>
    </section>
  </div>

  <div id="loader" class="loader-screen hidden" aria-live="polite">
    <div class="loader-grid" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
    </div>
  </div>

  <div id="twoFactorPage" class="auth-screen hidden">
    <section class="auth-card two-factor-card">
      <h1>Підтвердження 2FA</h1>
      <input
        id="twoFactorCode"
        class="two-factor-code"
        type="text"
        inputmode="numeric"
        autocomplete="one-time-code"
        maxlength="6"
        placeholder="000000"
        aria-label="Код 2FA"
      >
      <div class="auth-actions">
        <button id="twoFactorSubmitBtn" class="button button-primary">
          Підтвердити
        </button>
        <button id="twoFactorCancelBtn" class="button button-secondary">
          Скасувати
        </button>
      </div>
    </section>
  </div>

  <div id="deniedPage" class="auth-screen hidden">
    <section class="auth-card">
      <h1>Немає доступу</h1>
      <button id="deniedHubBtn" class="button button-secondary">
        Hub
      </button>
    </section>
  </div>

  <main id="app" class="app hidden">
    <header class="topbar">
      <div>
        <h1 id="appTitle"></h1>
        <p id="userName"></p>
      </div>
      <button id="hubBtn" class="button button-secondary topbar-button">
        Hub
      </button>
    </header>

    <nav id="dashboardTabs" class="tabs" aria-label="Дашборди"></nav>

    <section id="icsRegistry" class="registry-shell hidden">
      <header class="registry-header">
        <h2>Облік ІКС</h2>
        <button id="addIcsBtn" class="button button-primary" type="button">
          Додати ІКС
        </button>
      </header>
      <div id="icsList" class="ics-list"></div>
      <div id="icsEmpty" class="registry-empty hidden">
        Записи ІКС відсутні
      </div>
    </section>

    <section id="dashboardShell" class="dashboard-shell">
      <header class="dashboard-header">
        <h2>
          <a
            id="dashboardTitle"
            class="dashboard-title-link"
            target="_blank"
            rel="noopener noreferrer"
          ></a>
        </h2>
        <div class="zoom-controls" aria-label="Масштаб">
          <button id="zoomOutBtn" type="button" title="Зменшити">−</button>
          <button id="zoomResetBtn" type="button" title="За розміром">
            100%
          </button>
          <button id="zoomInBtn" type="button" title="Збільшити">+</button>
        </div>
      </header>

      <div id="dashboardViewport" class="dashboard-viewport">
        <div id="diagramLoader" class="diagram-loader hidden">
          <div class="loader-grid" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>
        <img id="diagramImage" class="diagram-image hidden" alt="">
      </div>

      <div id="dashboardEmpty" class="dashboard-empty hidden"></div>
    </section>
  </main>

  <div id="icsModal" class="ics-modal hidden" role="dialog" aria-modal="true">
    <div class="ics-modal-backdrop" data-close-ics-modal></div>
    <section class="ics-modal-panel">
      <header class="ics-modal-header">
        <h2 id="icsModalTitle"></h2>
        <button
          class="ics-modal-close"
          type="button"
          title="Закрити"
          aria-label="Закрити"
          data-close-ics-modal
        >×</button>
      </header>
      <div id="icsDetails" class="ics-details"></div>
      <form id="icsForm" class="ics-form hidden">
        <label>
          <span>Назва ІКС</span>
          <input name="name" type="text" minlength="2" maxlength="100" required>
        </label>
        <label>
          <span>Про ІКС</span>
          <textarea name="about" rows="4" maxlength="2000"></textarea>
        </label>
        <label>
          <span>Посилання</span>
          <input name="url" type="url" maxlength="500">
        </label>
        <label>
          <span>Документація ІКС</span>
          <textarea name="documentation" rows="3" maxlength="2000"></textarea>
        </label>
        <label>
          <span>Інформація про розгортання</span>
          <textarea name="deploymentInfo" rows="3" maxlength="2000"></textarea>
        </label>
        <label>
          <span>Які підрозділи використовують</span>
          <select id="icsUnits" name="units" multiple></select>
          <small>Можна вибрати декілька значень</small>
        </label>
        <label>
          <span>Командування</span>
          <select id="icsCommands" name="commands" multiple></select>
          <small>Можна вибрати декілька значень</small>
        </label>
        <label>
          <span>Посилання на логотип</span>
          <input name="logoUrl" type="url" maxlength="500">
        </label>
        <div class="ics-form-actions">
          <button id="saveIcsBtn" class="button button-primary" type="submit">
            Зберегти
          </button>
          <button class="button button-secondary" type="button" data-close-ics-modal>
            Скасувати
          </button>
        </div>
      </form>
    </section>
  </div>

  <div id="toast" class="toast hidden" role="status"></div>

  <script src="app.js"></script>
</body>
</html>
